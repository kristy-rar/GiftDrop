<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NFT Кейсы</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app">
<header class="header">
    <div class="balance-container">
        <span class="balance-label">Баланс</span>
        <span class="balance-value" id="balance">0 ⭐</span>
    </div>
    <div class="header-actions">
        <button class="topup-btn" onclick="goToTopUp()">
            <span class="topup-icon">⭐</span>
            <span class="topup-text">Пополнить</span>
        </button>
        <button class="profile-btn" onclick="goToProfile()">
            <span class="profile-icon">👤</span>
        </button>
    </div>
</header>

        <!-- Главный экран -->
        <main class="main">
            <h1 class="welcome-title">NFT Кейсы</h1>
            
            <div class="cases-grid">
                <!-- Ежедневный кейс -->
                <div class="case-card" onclick="openDailyCase()">
                    <div class="case-image">🎁</div>
                    <div class="case-info">
                        <h2 class="case-title">Ежедневный кейс</h2>
                        <p class="case-desc">Бесплатно · 1 раз в день</p>
                    </div>
                    <div class="case-arrow">→</div>
                </div>

                <!-- Рулетка с кейсами -->
                <div class="case-card" onclick="openRoulette()">
                    <div class="case-image">🎰</div>
                    <div class="case-info">
                        <h2 class="case-title">Рулетка</h2>
                        <p class="case-desc">Платные кейсы · 10⭐ / 100⭐</p>
                    </div>
                    <div class="case-arrow">→</div>
                </div>
            </div>
        </main>

<nav class="bottom-nav">
    <button class="nav-btn" onclick="goToHome()">
        <span class="nav-icon">🏠</span>
        <span class="nav-text">Главная</span>
    </button>
    <button class="nav-btn" onclick="goToProfile()">
        <span class="nav-icon">👤</span>
        <span class="nav-text">Профиль</span>
    </button>
    <button class="nav-btn" onclick="goToTopUp()">
        <span class="nav-icon">⭐</span>
        <span class="nav-text">Пополнить</span>
    </button>
</nav>
